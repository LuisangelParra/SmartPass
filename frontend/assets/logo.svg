<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none" role="img" aria-label="SmartPass">
  <!-- Icon: rounded rect (pass/badge shape) -->
  <rect x="2" y="2" width="40" height="40" rx="7" fill="#0D1117" stroke="#00E5C8" stroke-width="1.5"/>

  <!-- Face head ellipse -->
  <ellipse cx="22" cy="21" rx="10" ry="12" stroke="rgba(0,229,200,0.55)" stroke-width="1.2"/>

  <!-- Eyes (filled) -->
  <circle cx="17.5" cy="17" r="2.2" fill="#00E5C8"/>
  <circle cx="26.5" cy="17" r="2.2" fill="#00E5C8"/>

  <!-- Nose -->
  <line x1="22" y1="20" x2="22" y2="24" stroke="rgba(0,229,200,0.5)" stroke-width="1" stroke-linecap="round"/>

  <!-- Mouth arc -->
  <path d="M 17 27 Q 22 31 27 27" stroke="rgba(0,229,200,0.6)" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Scan lines (horizontal, across face) -->
  <line x1="7"  y1="19" x2="37" y2="19" stroke="rgba(0,229,200,0.18)" stroke-width="0.8"/>
  <line x1="7"  y1="23" x2="37" y2="23" stroke="rgba(0,229,200,0.18)" stroke-width="0.8"/>
  <line x1="7"  y1="27" x2="37" y2="27" stroke="rgba(0,229,200,0.18)" stroke-width="0.8"/>

  <!-- Corner brackets (top-left, top-right) -->
  <path d="M2 13 L2 2 L13 2" stroke="#00E5C8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M31 2 L42 2 L42 13" stroke="#00E5C8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text
    x="54" y="30"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="21"
    letter-spacing="-0.4"
  >
    <tspan fill="#E6EDF3">Smart</tspan><tspan fill="#00E5C8">Pass</tspan>
  </text>
</svg>
